name: compat

on:
  push:
    branches:
      - main
      - sharedworker-compat
  pull_request:

jobs:
  compat:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [14.x, 16.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm run verify:node
